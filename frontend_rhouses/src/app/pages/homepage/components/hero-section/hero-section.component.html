<div 
  class="relative h-[500px] md:h-[600px] flex items-center justify-center bg-cover bg-center"
  style="background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('https://images.unsplash.com/photo-1572345901383-be2fcd1625f3?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxydXJhbCUyMGhvdXNlJTIwY291bnRyeXNpZGUlMjBsYW5kc2NhcGV8ZW58MXx8fHwxNzc0OTMzNjY2fDA&ixlib=rb-4.1.0&q=80&w=1080')"
>
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center w-full">
    <!-- Título y subtítulo -->
    <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold text-white mb-4">
      Encuentra tu casa rural ideal
    </h1>
    <p class="text-lg md:text-xl text-white mb-8 opacity-90">
      Descubre espacios únicos en la naturaleza para tu próxima escapada
    </p>

    <!-- Buscador principal -->
    <div class="bg-white rounded-xl shadow-2xl p-4 md:p-6">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
        <!-- Población -->
        <div class="flex flex-col items-start">
          <label class="text-sm mb-1" style="color: var(--rhouses-secondary-dark)">
            Población
          </label>
          <input
            type="text"
            placeholder="¿Dónde quieres ir?"
            [(ngModel)]="searchData.poblacion"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[var(--rhouses-accent)] focus:border-transparent"
          />
        </div>

        <!-- Fecha de entrada -->
        <div class="flex flex-col items-start">
          <label class="text-sm mb-1" style="color: var(--rhouses-secondary-dark)">
            Fecha de entrada
          </label>
          <div class="relative w-full">
            <input
              type="date"
              [(ngModel)]="searchData.fecha"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[var(--rhouses-accent)] focus:border-transparent"
            />
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 h-5 w-5 pointer-events-none">
              <path d="M8 2v4"></path>
              <path d="M16 2v4"></path>
              <rect width="18" height="18" x="3" y="4" rx="2"></rect>
              <path d="M3 10h18"></path>
            </svg>
          </div>
        </div>

        <!-- Número de noches -->
        <div class="flex flex-col items-start">
          <label class="text-sm mb-1" style="color: var(--rhouses-secondary-dark)">
            Noches
          </label>
          <div class="relative w-full">
            <input
              type="number"
              min="1"
              [(ngModel)]="searchData.noches"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[var(--rhouses-accent)] focus:border-transparent"
            />
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 h-5 w-5 pointer-events-none">
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
            </svg>
          </div>
        </div>

        <!-- Tipo de alquiler -->
        <div class="flex flex-col items-start">
          <label class="text-sm mb-1" style="color: var(--rhouses-secondary-dark)">
            Tipo de alquiler
          </label>
          <select 
            [(ngModel)]="searchData.tipoAlquiler"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[var(--rhouses-accent)] focus:border-transparent"
          >
            <option value="ambas">Ambas opciones</option>
            <option value="completa">Casa completa</option>
            <option value="habitaciones">Por habitaciones</option>
          </select>
        </div>
      </div>

      <!-- Botón de búsqueda -->
      <button 
        (click)="onSearch()"
        class="w-full md:w-auto px-8 py-3 rounded-xl text-white font-semibold flex items-center justify-center gap-2 hover:opacity-90 transition-opacity"
        style="background-color: var(--rhouses-accent)"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
        Buscar casas disponibles
      </button>
    </div>
  </div>
</div>
