<!-- Estado de carga -->
<div *ngIf="loading" class="flex flex-col items-center justify-center py-20">
  <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-12 w-12 animate-spin mb-4" style="color: var(--rhouses-accent)">
    <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
  </svg>
  <p class="text-lg text-gray-600">Buscando casas disponibles...</p>
</div>

<!-- Sin resultados -->
<div *ngIf="!loading && empty" class="flex flex-col items-center justify-center py-20 px-4 text-center">
  <div 
    class="w-20 h-20 rounded-full flex items-center justify-center mb-4"
    style="background-color: var(--rhouses-background-light)"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-10 w-10" style="color: var(--rhouses-primary)">
      <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"></path>
      <path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
    </svg>
  </div>
  <h3 class="text-2xl font-semibold mb-2" style="color: var(--rhouses-secondary-dark)">
    No se encontraron casas
  </h3>
  <p class="text-gray-600 mb-6 max-w-md">
    No hay casas disponibles que coincidan con tus criterios de búsqueda. 
    Prueba ajustando los filtros o cambiando las fechas.
  </p>
  <div class="flex flex-col sm:flex-row gap-3">
    <button
      class="px-6 py-2 rounded-xl text-white font-semibold hover:opacity-90 transition-opacity"
      style="background-color: var(--rhouses-accent)"
    >
      Limpiar filtros
    </button>
    <button
      class="px-6 py-2 rounded-xl border-2 font-semibold hover:bg-gray-50 transition-colors"
      style="border-color: var(--rhouses-primary); color: var(--rhouses-primary)"
    >
      Buscar sin fechas
    </button>
  </div>
</div>

<!-- Grid de resultados -->
<div *ngIf="!loading && !empty">
  <!-- Header con contador -->
  <div class="mb-6">
    <h2 class="text-2xl font-semibold" style="color: var(--rhouses-secondary-dark)">
      Casas rurales disponibles
    </h2>
    <p class="text-gray-600 mt-1">
      {{mockHouses.length}} propiedades encontradas
    </p>
  </div>

  <!-- Grid fluido y responsive -->
  <div class="grid grid-cols-[repeat(auto-fill,minmax(min(300px,100%),1fr))] gap-6">
    <app-house-card 
      *ngFor="let house of mockHouses; trackBy: trackByHouseId" 
      [house]="house"
    ></app-house-card>
  </div>

  <!-- Paginación (opcional) -->
  <div class="mt-12 flex justify-center">
    <div class="flex items-center gap-2">
      <button class="px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-50 transition-colors">
        Anterior
      </button>
      <button 
        class="px-4 py-2 rounded-lg text-white font-semibold"
        style="background-color: var(--rhouses-accent)"
      >
        1
      </button>
      <button class="px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-50 transition-colors">
        2
      </button>
      <button class="px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-50 transition-colors">
        3
      </button>
      <button class="px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-50 transition-colors">
        Siguiente
      </button>
    </div>
  </div>
</div>
