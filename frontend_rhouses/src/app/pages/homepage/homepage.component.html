<div class="min-h-screen flex flex-col" style="background-color: var(--rhouses-background-light)">

  <app-navbar></app-navbar>

  <app-hero-section
    (searchResults)="onSearchResults($event)"
    (searchLoading)="onSearchLoading()">
  </app-hero-section>

  <main class="flex-grow">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">

      <div *ngIf="!isLoading && allHouses.length > 0" class="mb-6">
        <app-filter-trigger (triggerClick)="toggleFilter()"></app-filter-trigger>
      </div>

      <div class="flex gap-8 relative">
        <div
          [ngClass]="{
            'w-80 opacity-100': isFilterOpen,
            'w-0 opacity-0 overflow-hidden': !isFilterOpen
          }"
          class="transition-all duration-300 ease-in-out flex-shrink-0"
        >
          <app-filter-sidebar
            [isOpen]="isFilterOpen"
            [houses]="allHouses"
            [searchParams]="searchParams"
            (close)="closeFilter()"
            (filtered)="onFiltered($event)"
            (filterApplied)="onFilterApplied($event)">
          </app-filter-sidebar>
        </div>

        <div class="flex-1 transition-all duration-300 ease-in-out min-w-0">

          <div *ngIf="showingSuggestions && !isLoading" class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-6 rounded-md">
            <div class="flex">
              <div class="flex-shrink-0">
                <svg class="h-5 w-5 text-yellow-400" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                </svg>
              </div>
              <div class="ml-3">
                <p class="text-sm text-yellow-700">
                  No encontramos una casa exactamente con esas características. ¡Pero aquí tienes algunas sugerencias que te podrían encantar!
                </p>
              </div>
            </div>
          </div>

          <app-house-grid
            [houses]="filteredHouses"
            [loading]="isLoading"
            [searchParams]="searchParams">
          </app-house-grid>
        </div>
      </div>
    </div>
  </main>

  <app-footer></app-footer>
</div>
