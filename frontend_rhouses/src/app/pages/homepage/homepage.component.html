<div class="min-h-screen flex flex-col" style="background-color: var(--rhouses-background-light)">

  <app-navbar></app-navbar>

  <!-- Hero emite resultados y loading -->
  <app-hero-section
    (searchResults)="onSearchResults($event)"
    (searchLoading)="onSearchLoading()">
  </app-hero-section>

  <main class="flex-grow">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">

      <!-- Trigger de filtros — solo visible cuando hay resultados -->
      <div *ngIf="hasSearched && allHouses.length > 0" class="mb-6">
        <app-filter-trigger (triggerClick)="toggleFilter()"></app-filter-trigger>
      </div>

      <div class="flex gap-8 relative">
        <!-- Sidebar colapsable -->
        <div
          [ngClass]="{
            'w-80 opacity-100': isFilterOpen,
            'w-0 opacity-0 overflow-hidden': !isFilterOpen
          }"
          class="transition-all duration-300 ease-in-out flex-shrink-0"
        >
          <app-filter-sidebar
            [isOpen]="isFilterOpen"
            [houses]="allHouses"
            [searchParams]="searchParams"
            (close)="closeFilter()"
            (filtered)="onFiltered($event)">
          </app-filter-sidebar>
        </div>

        <!-- Grid principal -->
        <div class="flex-1 transition-all duration-300 ease-in-out min-w-0">
          <app-house-grid
            [houses]="filteredHouses"
            [loading]="isLoading"
            [searchParams]="searchParams"
            [hasSearched]="hasSearched">
          </app-house-grid>
        </div>
      </div>

    </div>
  </main>

  <app-footer></app-footer>
</div>
