<div class="min-h-screen flex flex-col" style="background-color: var(--rhouses-background-light)">
  <!-- Navbar -->
  <app-navbar [isLoggedIn]="isLoggedIn"></app-navbar>

  <!-- Hero Section -->
  <app-hero-section></app-hero-section>

  <!-- Main content con sidebar colapsable y grid -->
  <main class="flex-grow">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
      <!-- Trigger de filtros -->
      <div class="mb-6">
        <app-filter-trigger (triggerClick)="toggleFilter()"></app-filter-trigger>
      </div>

      <!-- Layout con sidebar y contenido -->
      <div class="flex gap-8 relative">
        <!-- Sidebar de filtros - Colapsable -->
        <div
          [ngClass]="{
            'w-80 opacity-100': isFilterOpen,
            'w-0 opacity-0 overflow-hidden': !isFilterOpen
          }"
          class="transition-all duration-300 ease-in-out"
        >
          <app-filter-sidebar
            [isOpen]="isFilterOpen"
            (close)="closeFilter()"
          ></app-filter-sidebar>
        </div>

        <!-- Grid de casas - Se ajusta automáticamente -->
        <div class="flex-1 transition-all duration-300 ease-in-out">
          <!-- Puedes cambiar las props para probar diferentes estados: -->
          <!-- <app-house-grid [loading]="true"></app-house-grid> -->
          <!-- <app-house-grid [empty]="true"></app-house-grid> -->
          <app-house-grid></app-house-grid>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <app-footer></app-footer>
</div>
