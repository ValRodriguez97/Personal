<div class="relative">
  <button
    (click)="toggleOpen()"
    class="flex items-center gap-2 px-4 py-2 bg-white border border-[#333745]/20 rounded-xl shadow-md hover:shadow-lg transition-shadow"
  >
    <lucide-icon name="calendar" class="w-4 h-4 text-[#333745]"></lucide-icon>
    <span class="text-sm text-[#333745]">
      {{ value.from | date:'dd/MM/yyyy' }} - {{ value.to | date:'dd/MM/yyyy' }}
    </span>
  </button>

  <div *ngIf="isOpen" class="absolute right-0 mt-2 p-4 bg-white rounded-xl shadow-lg border border-[#333745]/10 z-10 w-64">
    <div class="flex flex-col gap-3">

      <div>
        <label class="text-xs text-[#333745]/60 mb-1 block">Fecha Inicio</label>
        <input
          type="date"
          [value]="fromDateString"
          (change)="onFromChange($event)"
          class="w-full px-3 py-2 border border-[#333745]/20 rounded-lg text-sm"
        />
      </div>

      <div>
        <label class="text-xs text-[#333745]/60 mb-1 block">Fecha Fin</label>
        <input
          type="date"
          [value]="toDateString"
          (change)="onToChange($event)"
          class="w-full px-3 py-2 border border-[#333745]/20 rounded-lg text-sm"
        />
      </div>

      <button
        (click)="closePicker()"
        class="mt-2 w-full px-3 py-2 bg-[#AA4465] text-white rounded-lg text-sm hover:bg-[#AA4465]/90 transition-colors"
      >
        Aplicar
      </button>

    </div>
  </div>
</div>
