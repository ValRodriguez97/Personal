<div class="bg-white rounded-2xl shadow-md overflow-hidden transition-shadow duration-300 group"
     [ngClass]="isActive() ? 'hover:shadow-xl' : 'opacity-70'">

  <div class="relative h-48 overflow-hidden"
       [class.cursor-pointer]="isActive()"
       (click)="onViewStats()">
    <img [src]="getFirstPhoto()" [alt]="house.description || house.code"
         class="w-full h-full object-cover transition-transform duration-300"
         [ngClass]="isActive() ? 'group-hover:scale-105' : 'grayscale'"/>

    <div *ngIf="!isActive()"
         class="absolute inset-0 bg-black/30 flex items-center justify-center">
      <span class="bg-black/60 text-white text-xs font-bold px-3 py-1.5 rounded-full tracking-wide">
        DESACTIVADA
      </span>
    </div>

    <div *ngIf="isActive()" class="absolute top-3 right-3">
      <span class="px-2.5 py-1 text-white text-xs font-bold rounded-full"
            style="background-color: var(--rhouses-accent, #AA4465)">
        {{ house.populationName }}
      </span>
    </div>

    <div class="absolute top-3 left-3">
      <span class="px-2.5 py-1 text-white text-xs font-mono font-bold rounded-full bg-black/40">
        {{ house.code }}
      </span>
    </div>
  </div>

  <div class="p-5">
    <div class="mb-3">
      <h3 class="text-base font-black line-clamp-1 mb-0.5"
          style="color: var(--rhouses-secondary-dark, #333745)">
        {{ house.description || 'Casa Rural' }}
      </h3>
      <div class="flex items-center gap-2">
        <span class="text-xs font-semibold px-2 py-0.5 rounded-full"
              [ngClass]="isActive() ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'">
          {{ isActive() ? '● Activa' : '● Desactivada' }}
        </span>
        <span class="text-xs text-gray-400">{{ house.populationName }}</span>
      </div>
    </div>

    <div class="flex items-center gap-4 text-gray-500 text-xs mb-4">
      <div class="flex items-center gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/>
          <path d="M2 17h20"/><path d="M6 8v9"/>
        </svg>
        <span>{{ house.bedrooms?.length ?? 0 }} hab.</span>
      </div>
      <div class="flex items-center gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 6 6.5 3.5a1.5 1.5 0 0 0-1-.5C4.683 3 4 3.683 4 4.5V17a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-5"/>
          <line x1="2" x2="22" y1="12" y2="12"/>
        </svg>
        <span>{{ getTotalBathrooms() }} baños</span>
      </div>
      <div *ngIf="house.garagePlaces > 0" class="flex items-center gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <rect width="18" height="14" x="3" y="5" rx="2"/><path d="M3 10h18"/>
        </svg>
        <span>{{ house.garagePlaces }} garaje(s)</span>
      </div>
    </div>

    <div class="pt-3 border-t border-gray-100">
      <button
        (click)="onViewStats()"
        class="w-full flex items-center justify-center gap-1.5 py-2.5 rounded-xl
               text-xs font-bold transition-all border-2"
        [ngClass]="isActive()
          ? 'border-[#333745] text-[#333745] hover:bg-[#333745] hover:text-white'
          : 'border-gray-300 text-gray-400 cursor-not-allowed'"
        [disabled]="!isActive()">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>
        </svg>
        Ver Estadísticas
      </button>
    </div>
  </div>
</div>
